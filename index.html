// Section tabs shown INSIDE a home. The houses list is the level above these.
const HOME_TABS = [
  { key:"overview", label:"Home",      icon:ICONS.home },
  { key:"docs",     label:"Docs",      icon:ICONS.doc  },
  { key:"log",      label:"Log",       icon:ICONS.log  },
  { key:"remind",   label:"Reminders", icon:ICONS.bell },
];

function App(){
  const store = useStore();
  const [view, setView] = useState("houses");   // "houses" (top level) | "home" (inside one)
  const [tab, setTab] = useState("overview");    // section within a home
  const [sheet, setSheet] = useState(null);   // null | {home}
  const [eventSheet, setEventSheet] = useState(null);   // null | {event}
  const [remSheet, setRemSheet] = useState(null);       // null | {reminder, preset}
  const [docSheet, setDocSheet] = useState(null);       // null | {doc}
  const [docBusy, setDocBusy] = useState("");           // "" | "Adding 3 of 16..."
  const [importOpen, setImportOpen] = useState(false);
  const [importHomeId, setImportHomeId] = useState(null);
  const docFileRef = useRef(null);
  const docPhotoRef = useRef(null);
  const docDirRef = useRef(null);
  // webkitdirectory can't be set through JSX reliably, so stamp it on the hidden
  // folder input after mount. `directory` covers Firefox. This makes the picker
  // choose a FOLDER and return every file down the tree (desktop browsers only;
  // iOS has no folder picker).
  useEffect(() => {
    if(docDirRef.current){
      docDirRef.current.setAttribute("webkitdirectory", "");
      docDirRef.current.setAttribute("directory", "");
    }
  }, []);
  // The device picker fires its onChange long after the sheet closes, so the
  // chosen home rides in a ref rather than relying on closure timing.
  const importHomeRef = useRef(null);

  // Preload the Dropbox Chooser (if configured) so choose() runs inside the
  // click gesture instead of after an async load, which browsers would block.
  useEffect(() => { if(DROPBOX_APP_KEY) ensureDropbox().catch(()=>{}); }, []);
  const [inSettings, setInSettings] = useState(false);
  const [toast, setToast] = useState("");
  const [update, setUpdate] = useState({ state:"", available:false });

  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(""), 2200); };

  // PWA self-update: fetch the deployed index.html (no-store), regex the build,
  // compare with buildIsNewer. Bump BUILD on every deploy or this never fires.
  const checkUpdate = useCallback(async () => {
    setUpdate(u => ({...u, state:"checking"}));
    try{
      const r = await fetch(location.pathname + "?_=" + Date.now(), { cache:"no-store" });
      const html = await r.text();
      const m = html.match(/const BUILD = "([^"]+)"/);
      const remote = m ? m[1] : null;
      const vm = html.match(/const APP_VERSION = "([^"]+)"/);
      if(remote && buildIsNewer(remote, BUILD)){ setUpdate({ state:"", available:true, version: vm ? vm[1] : "" }); }
      else { setUpdate({ state:"current", available:false, version:"" }); }
    }catch(e){ setUpdate({ state:"error", available:false, version:"" }); log("ERROR","checkUpdate: "+e.message); }
  }, []);
  // Check on launch, on RESUME, and periodically while open. WHY: an installed
  // PWA is almost always resumed from the background rather than cold-launched,
  // so a launch-only check means the banner never surfaces on a phone. Debounced
  // so a burst of visibility events can't refetch repeatedly. (Ported from
  // MenuCaptain, which hit exactly this problem.)
  useEffect(() => {
    let lastCheck = 0;
    const MIN_GAP = 60 * 1000;                  // never refetch more than once a minute
    const maybeCheck = () => {
      const now = Date.now();
      if(now - lastCheck < MIN_GAP) return;
      lastCheck = now;
      checkUpdate();
    };
    const t = setTimeout(maybeCheck, 4000);     // initial launch check
    const onVis = () => { if(document.visibilityState === "visible") maybeCheck(); };
    document.addEventListener("visibilitychange", onVis);
    const iv = setInterval(maybeCheck, 20 * 60 * 1000);   // periodic while open
    return () => {
      clearTimeout(t); clearInterval(iv);
      document.removeEventListener("visibilitychange", onVis);
    };
  }, [checkUpdate]);

  // ---- navigation between the houses list and inside a house ----
  const enterHome = (h) => {
    if(store.cfg.activeHomeId !== h.id) store.saveCfg({ ...store.cfg, activeHomeId: h.id });
    setTab("overview"); setView("home");
  };
  const backToHouses = () => setView("houses");

  // ---- home CRUD handlers ----
  const saveHome = (rec) => {
    const homes = store.data.homes || [];
    const exists = homes.some(h => h.id === rec.id);
    const next = exists ? homes.map(h => h.id===rec.id ? rec : h) : [rec, ...homes];
    store.saveCollection("homes", next);
    if(!store.cfg.activeHomeId || !exists) store.saveCfg({ ...store.cfg, activeHomeId: rec.id });
    setSheet(null);
    showToast(exists ? "Home updated" : "Home added");
    if(!exists){ setTab("overview"); setView("home"); }   // a new home opens straight into its hub
  };
  const deleteHome = (id) => {
    const next = (store.data.homes||[]).filter(h => h.id !== id);
    store.saveCollection("homes", next);
    if(store.cfg.activeHomeId === id) store.saveCfg({ ...store.cfg, activeHomeId: next[0] ? next[0].id : null });
    setSheet(null);
    setView("houses");                                    // deleting the current home returns to the list
    showToast("Home deleted");
  };

  // ---- event (log) handlers ----
  const saveEvent = (rec) => {
    const events = store.data.events || [];
    const exists = events.some(e => e.id === rec.id);
    const next = exists ? events.map(e => e.id===rec.id ? rec : e) : [rec, ...events];
    store.saveCollection("events", next);
    setEventSheet(null);
    showToast(exists ? "Entry updated" : "Logged");
  };
  const deleteEvent = (id) => {
    store.saveCollection("events", (store.data.events||[]).filter(e => e.id !== id));
    setEventSheet(null);
    showToast("Entry deleted");
  };

  // ---- reminder handlers ----
  const saveReminder = (rec) => {
    const list = store.data.reminders || [];
    const exists = list.some(r => r.id === rec.id);
    const next = exists ? list.map(r => r.id===rec.id ? rec : r) : [rec, ...list];
    store.saveCollection("reminders", next);
    setRemSheet(null);
    showToast(exists ? "Reminder updated" : "Reminder added");
  };
  const deleteReminder = (id) => {
    store.saveCollection("reminders", (store.data.reminders||[]).filter(r => r.id !== id));
    setRemSheet(null);
    showToast("Reminder deleted");
  };
  // ---- document handlers ----
  // Batch add: each picked file becomes its own auto-classified document. Uploads
  // run one at a time so the progress count is honest and memory stays bounded.
  const addDocuments = async (fileList, homeId) => {
    const files = Array.from(fileList || []);
    if(!files.length) return;
    // Snapshot existing docs so re-selecting the whole folder dedupes against
    // what's already here. We track adds + replacements against this base and
    // save once at the end.
    const base = store.data.documents || [];
    const added = [];
    const replacements = {};     // docId -> updated record
    const oldPathsToDelete = [];
    let skipped = 0, unchanged = 0, revised = 0;
    for(let i=0; i<files.length; i++){
      const f = files[i];
      // A folder pick carries a path ("656 River Way/Closing/cd.pdf"): natively
      // via webkitRelativePath (input) or via _rel (showDirectoryPicker walk).
      // A plain file pick has neither, so this handles all three. `rel` is the
      // dedupe identity and `baseName` is the display filename.
      const rel = f.webkitRelativePath || f._rel || f.name;
      const baseName = rel.split("/").pop();
      setDocBusy("Adding " + (i+1) + " of " + files.length + "…");
      if(isJunkFile(rel)){ skipped++; continue; }
      if(f.size === 0){ skipped++; continue; }                 // empty/placeholder files
      if(f.size > DOC_MAX_BYTES){ skipped++; log("DOC","skipped oversize "+rel+" ("+humanSize(f.size)+")"); continue; }
      const verdict = classifyIncoming(base, homeId, rel, f.size);
      if(verdict.action === "skip"){ unchanged++; continue; }
      try{
        const dataUrl = await fileToDataURL(f);
        const docId = verdict.action === "replace" ? verdict.doc.id : uid();
        const path = "documents/" + docId + "/" + Date.now().toString(36) + "-" + safeName(baseName);
        await uploadFile(path, dataUrl);
        if(verdict.action === "replace"){
          // Keep the record (category, note, applied facts stay), swap the file,
          // and clear the cached AI read since the content changed.
          if(verdict.doc.path && verdict.doc.path !== path) oldPathsToDelete.push(verdict.doc.path);
          replacements[docId] = { ...verdict.doc, path, size: f.size,
            mime: f.type || (isPdfName(baseName) ? "application/pdf" : ""),
            sourceName: rel, extracted: undefined, updatedAt: nowISO() };
          revised++;
        } else {
          added.push({
            id: docId, home_id: homeId,
            name: stripExt(baseName), category: classifyDoc(baseName),
            path, size: f.size, mime: f.type || (isPdfName(baseName) ? "application/pdf" : ""),
            sourceName: rel, note: "", createdAt: nowISO(), updatedAt: nowISO(),
          });
        }
      }catch(e){ skipped++; log("ERROR","addDocuments "+rel+": "+e.message); }
    }
    setDocBusy("");
    if(added.length || Object.keys(replacements).length){
      const merged = base.map(d => replacements[d.id] || d);
      store.saveCollection("documents", [...added, ...merged]);
      oldPathsToDelete.forEach(p => deleteFile(p));   // best-effort storage cleanup
    }
    const parts = [];
    if(added.length) parts.push(added.length + " added");
    if(revised) parts.push(revised + " updated");
    if(unchanged) parts.push(unchanged + " unchanged");
    if(skipped) parts.push(skipped + " skipped");
    showToast(parts.length ? parts.join(", ") : "Nothing added");
  };
  const pickDocuments = (kind) => {
    const ref = kind === "photos" ? docPhotoRef : kind === "folder" ? docDirRef : docFileRef;
    if(ref.current) ref.current.click();
  };
  // Folder import. Prefer the File System Access API (showDirectoryPicker) - it
  // opens the normal "Select folder" dialog and lets us walk the tree ourselves,
  // which is far clearer than the webkitdirectory upload dialog. Falls back to
  // that hidden input on browsers without the API (Firefox/Safari; never mobile).
  const handleFolder = () => {
    const homes = store.data.homes || [];
    const ah = homes.find(h => h.id === store.cfg.activeHomeId) || homes[0] || null;
    if(!ah) return;
    if(!window.showDirectoryPicker){ setImportOpen(false); pickDocuments("folder"); return; }
    // Call the picker synchronously inside the click so the gesture is preserved.
    window.showDirectoryPicker().then(async (dir) => {
      setImportOpen(false);
      setDocBusy("Reading folder…");
      const files = [];
      const walk = async (handle, prefix) => {
        for await (const entry of handle.values()){
          const rel = prefix ? prefix + "/" + entry.name : entry.name;
          if(entry.kind === "file"){
            const f = await entry.getFile();
            try { Object.defineProperty(f, "webkitRelativePath", { value: rel, configurable:true }); } catch(e){}
            try { f._rel = rel; } catch(e){}
            files.push(f);
          } else if(entry.kind === "directory"){
            await walk(entry, rel);
          }
        }
      };
      try { await walk(dir, dir.name); } catch(e){ log("ERROR","folder walk: " + e.message); }
      setDocBusy("");
      if(files.length) addDocuments(files, ah.id);
      else showToast("That folder had no files.");
    }).catch((e) => {
      if(e && e.name === "AbortError") return;    // user cancelled - not an error
      log("ERROR","showDirectoryPicker: " + (e && e.message));
      setImportOpen(false);
      showToast("Couldn't open that folder.");
    });
  };
  const onDocFiles = (e) => {
    const files = e.target.files;
    e.target.value = "";
    const homes = store.data.homes || [];
    const fallback = homes.find(h => h.id === store.cfg.activeHomeId) || homes[0] || null;
    const targetId = importHomeRef.current || (fallback ? fallback.id : null);
    if(targetId) addDocuments(files, targetId);
  };
  // Open the import sheet aimed at the currently active home.
  const openImport = () => {
    const homes = store.data.homes || [];
    const ah = homes.find(h => h.id === store.cfg.activeHomeId) || homes[0] || null;
    const id = ah ? ah.id : null;
    setImportHomeId(id); importHomeRef.current = id;
    setImportOpen(true);
  };
  const pickImportHome = (id) => { setImportHomeId(id); importHomeRef.current = id; };
  // Shared by Dropbox + link import: the backend fetches each URL and stores it.
  const addFromUrls = async (items, homeId) => {
    if(!items.length) return;
    const added = []; let failed = 0;
    for(let i=0; i<items.length; i++){
      const it = items[i];
      setDocBusy("Importing " + (i+1) + " of " + items.length + "…");
      try{
        const docId = uid();
        const path = "documents/" + docId + "/" + safeName(it.name);
        const res = await importFromUrl(path, it.url);
        added.push({
          id: docId, home_id: homeId,
          name: stripExt(it.name), category: classifyDoc(it.name),
          path, size: (res && res.size) || it.bytes || 0, mime: (res && res.content_type) || "",
          sourceName: it.name, note: "", createdAt: nowISO(), updatedAt: nowISO(),
        });
      }catch(e){ failed++; log("ERROR","import "+it.name+": "+e.message);
        if(items.length===1) showToast(e.message); }
    }
    setDocBusy("");
    if(added.length) store.saveCollection("documents", [...added, ...(store.data.documents||[])]);
    if(added.length || items.length>1)
      showToast(added.length ? added.length + " imported" + (failed ? ", " + failed + " failed" : "") : "Import failed");
  };
  const chooseDropbox = (homeId) => {
    setImportOpen(false);
    if(!(window.Dropbox && window.Dropbox.choose)){
      ensureDropbox().then(()=>showToast("Dropbox is ready, tap Dropbox again")).catch(e=>showToast(e.message));
      return;
    }
    window.Dropbox.choose({
      linkType: "direct", multiselect: true,
      extensions: [".pdf",".png",".jpg",".jpeg",".gif",".webp"],
      success: (files) => addFromUrls(files.map(f => ({ name:f.name, url:f.link, bytes:f.bytes })), homeId),
      cancel: () => {},
    });
  };
  const importLink = (url, name, homeId) => {
    setImportOpen(false);
    addFromUrls([{ name: name || nameFromUrl(url), url }], homeId);
  };

  const saveDoc = (rec) => {
    const list = store.data.documents || [];
    const next = list.map(d => d.id===rec.id ? rec : d);
    store.saveCollection("documents", next);
    setDocSheet(null);
    showToast("Document updated");
  };
  const deleteDoc = (d) => {
    store.saveCollection("documents", (store.data.documents||[]).filter(x => x.id !== d.id));
    if(d.path) deleteFile(d.path);
    setDocSheet(null);
    showToast("Document deleted");
  };
  const openDoc = (d) => { openStoredFile(d.path, showToast); };
  // Read a document with AI, then cache the result on the doc so re-opening it
  // shows the same facts without paying to re-read. Returns the result to the sheet.
  const extractDoc = async (d) => {
    const res = await extractDocument(d.path);
    const stamped = { ...res, at: nowISO() };
    const list = store.data.documents || [];
    store.saveCollection("documents", list.map(x => x.id===d.id ? {...x, extracted: stamped} : x));
    return stamped;
  };
  // Merge extracted facts onto the document's home. Stores every field under its
  // own key, and fills the profile slots the UI already shows only when empty,
  // so applying twice or over existing data never clobbers what you typed.
  const applyDocFacts = (d, fields) => {
    const homes = store.data.homes || [];
    const home = homes.find(h => h.id === d.home_id);
    if(!home){ showToast("Home not found"); return; }
    const facts = { ...(home.facts||{}) };
    // Profile fields the app shows and the user may have typed: FILL only when
    // empty, never overwrite. (A blanket {...fields} spread was clobbering a
    // typed yearBuilt/sqft/beds/baths, so those are handled one at a time.)
    const fillIfEmpty = (key, val) => {
      if(val!=null && val!=="" && (facts[key]==null || facts[key]==="")) facts[key]=val;
    };
    fillIfEmpty("lastSalePrice", fields.purchasePrice);
    fillIfEmpty("lastSaleDate",  fields.closingDate);
    fillIfEmpty("lotSize",       fields.lotSizeSqft);
    fillIfEmpty("squareFootage", fields.squareFootage);
    fillIfEmpty("yearBuilt",     fields.yearBuilt);
    fillIfEmpty("bedrooms",      fields.bedrooms);
    fillIfEmpty("bathrooms",     fields.bathrooms);
    // Document-only facts (never shown as profile chips) stored under their own
    // keys; these come straight from the closing paperwork, so taking the
    // document value is correct.
    ["purchasePrice","loanAmount","loanType","lender","interestRate","monthlyPayment",
     "closingDate","lotSizeAcres","parcelNumber","legalDescription","propertyAddress"]
      .forEach(k => { if(fields[k]!=null && fields[k]!=="") facts[k]=fields[k]; });
    const patch = { ...home, facts, updatedAt: nowISO() };
    if(fields.closingDate && !home.purchaseDate) patch.purchaseDate = fields.closingDate;
    store.saveCollection("homes", homes.map(h => h.id===home.id ? patch : h));
    showToast("Added to " + home.name);
  };

  // Repeating: roll the due date forward from today. One-time: toggle done/reopen.
  const completeReminder = (r) => {
    const list = store.data.reminders || [];
    let next, msg;
    if(r.repeat && r.every){
      const nd = nextDueFromToday(r);
      next = list.map(x => x.id===r.id ? {...x, dueDate:nd, lastDoneAt:nowISO(), doneAt:null, updatedAt:nowISO()} : x);
      msg = "Done · next due " + fmtDate(nd);
    } else {
      const reopening = !!r.doneAt;
      next = list.map(x => x.id===r.id
        ? {...x, doneAt: reopening ? null : nowISO(), lastDoneAt: reopening ? x.lastDoneAt : nowISO(), updatedAt:nowISO()}
        : x);
      msg = reopening ? "Reopened" : "Marked done";
    }
    store.saveCollection("reminders", next);
    showToast(msg);
  };

  if(!store.authReady){
    return <div className="app"><div className="spin spin-lg"></div></div>;
  }
  if(!store.authed){
    return <AuthScreen />;
  }

  const homes = store.data.homes || [];
  const activeHome = homes.find(h => h.id === store.cfg.activeHomeId) || null;
  const inHome = view === "home" && !!activeHome;   // guard: never "inside" a home that's gone

  return (
    <div className="app">
      {update.available &&
        <button className="update-bar" onClick={()=>{
            // Wipe the SW caches first so the reload can't be served a stale shell.
            try { if(navigator.serviceWorker && navigator.serviceWorker.controller)
                    navigator.serviceWorker.controller.postMessage("clearCache"); } catch(e){}
            setTimeout(()=>location.reload(true), 120);
          }}>
          <span>A new version of HomeCaptain is ready{update.version ? " (v"+update.version+")" : ""}.</span>
          <span className="update-go">Update</span>
        </button>}

      <div className="topbar">
        <div className="topbar-row">
          {inSettings ? (
            <>
              <div><div className="eyebrow">HomeCaptain</div><h1 className="title">Settings</h1></div>
              <button className="icon-btn" onClick={()=>setInSettings(false)} aria-label="Back"><Icon d={ICONS.back} size={21}/></button>
            </>
          ) : inHome ? (
            <>
              <div style={{display:"flex", alignItems:"center", gap:8, minWidth:0}}>
                <button className="backbtn" onClick={backToHouses} aria-label="All homes"><Icon d={ICONS.back} size={19}/></button>
                <div style={{minWidth:0}}>
                  <div className="eyebrow">{HOME_TABS.find(t=>t.key===tab).label}</div>
                  <h1 className="title" style={{whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{activeHome.name}</h1>
                </div>
              </div>
              <button className="icon-btn" onClick={()=>setInSettings(true)} aria-label="Settings"><Icon d={ICONS.gear} size={21}/></button>
            </>
          ) : (
            <>
              <div><div className="eyebrow">HomeCaptain</div><h1 className="title">Your homes</h1></div>
              <button className="icon-btn" onClick={()=>setInSettings(true)} aria-label="Settings"><Icon d={ICONS.gear} size={21}/></button>
            </>
          )}
        </div>
        <div className={"sync "+store.sync}>
          <span className="dot"></span>
          {store.sync==="idle" && "All changes saved"}
          {store.sync==="busy" && "Syncing..."}
          {store.sync==="pending" && "Offline - will sync"}
          {store.sync==="error" && (store.syncMsg || "Sync error")}
        </div>
      </div>

      <div className="screen">
        {inSettings
          ? <SettingsScreen store={store} onCheckUpdate={checkUpdate} updateState={update.state} />
          : inHome
            ? (
                tab==="overview" ? <HomeOverview store={store} home={activeHome} onEdit={()=>setSheet({home:activeHome})} onGoto={setTab} />
              : tab==="docs"     ? <DocsScreen store={store} home={activeHome} onAdd={openImport} onEdit={(d)=>setDocSheet({doc:d})} onOpen={openDoc} />
              : tab==="log"      ? <LogScreen store={store} home={activeHome} onAdd={()=>setEventSheet({event:null})} onEdit={(e)=>setEventSheet({event:e})} />
              :                    <RemindersScreen store={store} home={activeHome}
                                     onAdd={(preset)=>setRemSheet({reminder:null, preset:preset||null})}
                                     onEdit={(r)=>setRemSheet({reminder:r, preset:null})}
                                     onComplete={completeReminder} />
              )
            : <HomesScreen store={store} onAdd={()=>setSheet({home:null})} onEnter={enterHome} />}
      </div>

      {!inSettings && !inHome &&
        <button className="fab" onClick={()=>setSheet({home:null})} aria-label="Add home"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && inHome && tab==="log" &&
        <button className="fab" onClick={()=>setEventSheet({event:null})} aria-label="Log an entry"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && inHome && tab==="remind" && (store.data.reminders||[]).some(r=>r.home_id===activeHome.id) &&
        <button className="fab" onClick={()=>setRemSheet({reminder:null, preset:null})} aria-label="Add reminder"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && inHome && tab==="docs" && (store.data.documents||[]).some(d=>d.home_id===activeHome.id) &&
        <button className="fab" onClick={openImport} aria-label="Add documents"><Icon d={ICONS.plus} size={26}/></button>}

      {/* Two inputs on purpose. iOS only shows the Photo Library / Take Photo /
          Choose File action sheet when the input ACCEPTS images; with no accept
          it opens the Files browser directly, which is where Dropbox, iCloud and
          Box appear. So the cloud path gets its own input to skip that hop. */}
      <input ref={docFileRef} type="file" multiple style={{display:"none"}} onChange={onDocFiles} />
      <input ref={docPhotoRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={onDocFiles} />
      <input ref={docDirRef} type="file" multiple style={{display:"none"}} onChange={onDocFiles} />
      {docBusy && <div className="toast">{docBusy}</div>}

      {importOpen && activeHome &&
        <ImportSheet
          homes={store.data.homes||[]}
          homeId={importHomeId || activeHome.id}
          onHome={pickImportHome}
          showDropbox={!!DROPBOX_APP_KEY}
          onFiles={()=>{ setImportOpen(false); pickDocuments("files"); }}
          onFolder={handleFolder}
          onPhotos={()=>{ setImportOpen(false); pickDocuments("photos"); }}
          onDropbox={()=>chooseDropbox(importHomeId || activeHome.id)}
          onLink={(url,name)=>importLink(url, name, importHomeId || activeHome.id)}
          onClose={()=>setImportOpen(false)} />}

      {!inSettings && inHome &&
        <nav className="nav">
          {HOME_TABS.map(t => (
            <button key={t.key} className={"nav-btn "+(tab===t.key?"on":"")} onClick={()=>setTab(t.key)}>
              <Icon d={t.icon} size={22}/>
              {t.label}
            </button>
          ))}
        </nav>}

      {sheet &&
        <HomeSheet home={sheet.home} onSave={saveHome} onDelete={deleteHome} onClose={()=>setSheet(null)} />}

      {eventSheet && activeHome &&
        <EventSheet event={eventSheet.event} homeId={activeHome.id} onSave={saveEvent} onDelete={deleteEvent} onClose={()=>setEventSheet(null)} />}

      {remSheet && activeHome &&
        <ReminderSheet reminder={remSheet.reminder} preset={remSheet.preset} homeId={activeHome.id}
          onSave={saveReminder} onDelete={deleteReminder} onClose={()=>setRemSheet(null)} />}

      {docSheet &&
        <DocSheet doc={docSheet.doc}
          homeName={((store.data.homes||[]).find(h=>h.id===docSheet.doc.home_id)||{}).name || ""}
          onSave={saveDoc} onDelete={deleteDoc} onOpen={openDoc}
          onExtract={extractDoc} onApply={applyDocFacts} onClose={()=>setDocSheet(null)} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// Offline service worker. Relative path, so its scope is this app's subpath
// (/homecaptain-app/). Needs https or localhost; skipped silently elsewhere.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(() => log("SW","registered"))
      .catch(e => log("ERROR","sw register: "+e.message));
  });
}
</script>
</body>
</html>
